{% extends "base.html" %}

{% block title %}控制台 - 墨冉AI{% endblock %}

{% block content %}
<div class="chat-container-full">
    <!-- 左侧：对话历史 -->
    <div class="history-sidebar">
        <div class="sidebar-header">
            <h3>对话历史</h3>
            <button class="btn btn-primary btn-sm" onclick="createNewConversation()">+ 新建对话</button>
        </div>
        
        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索对话..." oninput="searchConversations()">
            <span class="search-icon">🔍</span>
        </div>
        
        <!-- 分类筛选 -->
        <div class="category-filter">
            <select id="categoryFilter" onchange="filterByCategory()">
                <option value="all">全部分类</option>
                <option value="default">默认</option>
            </select>
        </div>
        
        <!-- 历史列表 -->
        <div class="history-list" id="historyList">
            <div class="loading-text">加载中...</div>
        </div>
    </div>
    
    <!-- 右侧：聊天区域 -->
    <div class="chat-area">
        <div class="card chat-card">
            <div class="model-selector">
                <label>选择模型：</label>
                <select id="modelSelect" onchange="changeModel()">
                    {% for m in models %}
                    <option value="{{ m.name }}" {% if m.name == selected_model %}selected{% endif %}>{{ m.display_name or m.name }}</option>
                    {% endfor %}
                </select>
                <span style="margin-left:auto;color:#8c8c8c;font-size:12px">
                    API Key: <code id="apiKeyDisplay">{{ api_key[:10] }}...</code>
                    <button class="btn btn-default" style="padding:2px 8px;margin-left:5px" onclick="copyApiKey()">复制</button>
                </span>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <div class="welcome-icon">💬</div>
                    <p>选择模型开始对话</p>
                    <p class="welcome-hint">支持多轮对话，自动维护上下文</p>
                </div>
            </div>
            
            <div id="typingIndicator" class="typing-indicator">
                <span>AI 正在思考中...</span>
            </div>
            
            <div class="chat-input-area">
                <textarea id="userInput" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行" onkeydown="handleKeydown(event)"></textarea>
                <button class="btn btn-primary" style="width:100px" onclick="sendMessage()">发送</button>
            </div>
            
            <div class="chat-footer">
                <div class="footer-left">
                    <button class="btn btn-default" onclick="clearChat()">清空对话</button>
                    <button class="btn btn-default" onclick="toggleHistory()">历史侧边栏</button>
                </div>
                <div class="footer-right">
                    <span style="color:#8c8c8c;font-size:12px">余额：¥{{ (user.balance|round(2)) if user else 0 }}</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
var messages = [];
var isLoading = false;
var apiKey = '{{ api_key }}';
var currentConversationId = '{{ conversation_id or '' }}';
var conversations = [];
var currentPage = 1;

function loadConversations(page = 1) {
    var search = document.getElementById('searchInput')?.value || '';
    var category = document.getElementById('categoryFilter')?.value || '';
    
    fetch(`/api/conversations?page=${page}&search=${encodeURIComponent(search)}&category=${category}`)
        .then(res => res.json())
        .then(data => {
            if (page === 1) {
                conversations = data.data;
            } else {
                conversations = conversations.concat(data.data);
            }
            renderHistoryList();
        })
        .catch(err => {
            console.error('加载对话失败:', err);
        });
}

function renderHistoryList() {
    var list = document.getElementById('historyList');
    
    if (conversations.length === 0) {
        list.innerHTML = '<div class="empty-history">暂无对话记录</div>';
        return;
    }
    
    list.innerHTML = conversations.map(conv => `
        <div class="history-item ${conv.id == currentConversationId ? 'active' : ''}" onclick="loadConversation(${conv.id})">
            <div class="history-title">${escapeHtml(conv.title)}</div>
            <div class="history-meta">
                <span class="history-model">${conv.model || '-'}</span>
                <span class="history-count">${conv.message_count || 0} 条消息</span>
                <span class="history-time">${formatTime(conv.updated_at)}</span>
            </div>
            <button class="history-delete" onclick="event.stopPropagation(); deleteConversation(${conv.id})">删除</button>
        </div>
    `).join('');
}

function createNewConversation() {
    fetch('/api/conversations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: '未命名对话', model: document.getElementById('modelSelect').value })
    }).then(res => res.json())
      .then(data => {
          currentConversationId = data.id;
          messages = [];
          document.getElementById('chatMessages').innerHTML = `
              <div class="welcome-message">
                  <div class="welcome-icon">💬</div>
                  <p>选择模型开始对话</p>
                  <p class="welcome-hint">支持多轮对话，自动维护上下文</p>
              </div>
          `;
          loadConversations(1);
      });
}

function loadConversation(id) {
    fetch(`/api/conversations/${id}`)
        .then(res => res.json())
        .then(data => {
            currentConversationId = id;
            messages = data.messages.map(m => ({ role: m.role, content: m.content }));
            
            var container = document.getElementById('chatMessages');
            container.innerHTML = '';
            
            data.messages.forEach(msg => {
                addMessage(msg.role, msg.content, false);
            });
            
            renderHistoryList();
            scrollToBottom();
        })
        .catch(err => {
            console.error('加载对话失败:', err);
        });
}

function deleteConversation(id) {
    if (!confirm('确定要删除这个对话吗？')) return;
    
    fetch(`/api/conversations/${id}`, { method: 'DELETE' })
        .then(res => res.json())
        .then(() => {
            if (currentConversationId == id) {
                currentConversationId = '';
                messages = [];
                document.getElementById('chatMessages').innerHTML = `
                    <div class="welcome-message">
                        <div class="welcome-icon">💬</div>
                        <p>选择模型开始对话</p>
                        <p class="welcome-hint">支持多轮对话，自动维护上下文</p>
                    </div>
                `;
            }
            loadConversations(1);
        });
}

function searchConversations() {
    loadConversations(1);
}

function filterByCategory() {
    loadConversations(1);
}

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatTime(timeStr) {
    if (!timeStr) return '';
    var date = new Date(timeStr);
    var now = new Date();
    var diff = now - date;
    
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
    return timeStr.split(' ')[0];
}

function changeModel() {
    var model = document.getElementById('modelSelect').value;
    var url = new URL(window.location);
    url.searchParams.set('model', model);
    window.history.pushState({}, '', url);
}

function handleKeydown(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
    }
}

function sendMessage() {
    if (isLoading) return;
    
    var input = document.getElementById('userInput');
    var content = input.value.trim();
    
    if (!content) return;
    
    var model = document.getElementById('modelSelect').value;
    
    // 添加用户消息
    messages.push({ role: 'user', content: content });
    addMessage('user', content);
    
    input.value = '';
    isLoading = true;
    document.getElementById('typingIndicator').style.display = 'flex';
    
    // 发送请求
    fetch('/v1/chat/completions', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
            model: model,
            messages: messages,
            stream: true
        })
    }).then(function(response) {
        if (!response.ok) {
            throw new Error('请求失败: ' + response.status);
        }
        
        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var assistantContent = '';
        var messageDiv = addMessage('assistant', '');
        
        function readStream() {
            reader.read().then(function(result) {
                if (result.done) {
                    isLoading = false;
                    document.getElementById('typingIndicator').style.display = 'none';
                    messages.push({ role: 'assistant', content: assistantContent });
                    
                    // 保存对话
                    saveMessage(assistantContent, model);
                    return;
                }
                
                var chunk = decoder.decode(result.value, { stream: true });
                var lines = chunk.split('\n');
                
                lines.forEach(function(line) {
                    if (line.startsWith('data: ')) {
                        var data = line.slice(6).trim();
                        if (data === '[DONE]') return;
                        
                        try {
                            var json = JSON.parse(data);
                            if (json.choices && json.choices[0].delta && json.choices[0].delta.content) {
                                assistantContent += json.choices[0].delta.content;
                                messageDiv.innerHTML = formatContent(assistantContent);
                                scrollToBottom();
                            }
                        } catch (e) {
                            // 忽略解析错误
                        }
                    }
                });
                
                readStream();
            });
        }
        
        readStream();
    }).catch(function(error) {
        isLoading = false;
        document.getElementById('typingIndicator').style.display = 'none';
        addMessage('assistant', '错误: ' + error.message);
    });
}

function saveMessage(content, model) {
    if (!currentConversationId) {
        // 创建新对话
        fetch('/api/conversations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: content.substring(0, 30) + (content.length > 30 ? '...' : ''), model: model })
        }).then(res => res.json())
          .then(data => {
              currentConversationId = data.id;
              // 保存用户消息
              messages.forEach(msg => {
                  fetch(`/api/conversations/${currentConversationId}/messages`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ role: msg.role, content: msg.content })
                  });
              });
              loadConversations(1);
          });
    } else {
        // 保存助手消息
        fetch(`/api/conversations/${currentConversationId}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role: 'assistant', content: content })
        }).then(() => {
            loadConversations(1);
        });
    }
}

function addMessage(role, content, scroll = true) {
    var container = document.getElementById('chatMessages');
    
    // 清除欢迎信息
    if (container.querySelector('.welcome-message')) {
        container.innerHTML = '';
    }
    
    var div = document.createElement('div');
    div.className = 'chat-message ' + role;
    div.innerHTML = formatContent(content);
    container.appendChild(div);
    
    if (scroll) {
        scrollToBottom();
    }
    
    return div;
}

function formatContent(content) {
    content = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    content = content.replace(/\n/g, '<br>');
    content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
    return content;
}

function scrollToBottom() {
    var container = document.getElementById('chatMessages');
    container.scrollTop = container.scrollHeight;
}

function clearChat() {
    if (confirm('确定要清空对话吗？')) {
        messages = [];
        document.getElementById('chatMessages').innerHTML = `
            <div class="welcome-message">
                <div class="welcome-icon">💬</div>
                <p>选择模型开始对话</p>
                <p class="welcome-hint">支持多轮对话，自动维护上下文</p>
            </div>
        `;
    }
}

function copyApiKey() {
    navigator.clipboard.writeText(apiKey).then(function() {
        alert('API Key 已复制到剪贴板');
    }).catch(function() {
        var input = document.createElement('input');
        input.value = apiKey;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('API Key 已复制到剪贴板');
    });
}

function toggleHistory() {
    var sidebar = document.querySelector('.history-sidebar');
    sidebar.style.display = sidebar.style.display === 'none' ? 'block' : 'none';
}

// 页面加载时加载对话列表
document.addEventListener('DOMContentLoaded', function() {
    loadConversations(1);
    
    // 如果有初始对话ID，加载它
    if (currentConversationId) {
        loadConversation(currentConversationId);
    }
    
    // 加载分类
    fetch('/api/categories')
        .then(res => res.json())
        .then(categories => {
            var select = document.getElementById('categoryFilter');
            categories.forEach(cat => {
                var option = document.createElement('option');
                option.value = cat.name;
                option.textContent = cat.name;
                select.appendChild(option);
            });
        });
});

// 页面加载时聚焦输入框
document.getElementById('userInput').focus();
</script>

<style>
.chat-container-full {
    display: flex;
    gap: 15px;
    height: calc(100vh - 100px);
}

.history-sidebar {
    width: 320px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    border-bottom: 1px solid #f0f0f0;
}

.sidebar-header h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
}

.search-box {
    position: relative;
    padding: 10px 15px;
    border-bottom: 1px solid #f0f0f0;
}

.search-box input {
    width: 100%;
    padding: 8px 30px 8px 12px;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    font-size: 13px;
    box-sizing: border-box;
}

.search-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
}

.category-filter {
    padding: 10px 15px;
    border-bottom: 1px solid #f0f0f0;
}

.category-filter select {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid #e8e8e8;
    border-radius: 4px;
    font-size: 12px;
}

.history-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.history-item {
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
    position: relative;
    background: #fafafa;
}

.history-item:hover {
    background: #f0f5ff;
}

.history-item.active {
    background: #e6f7ff;
    border-left: 3px solid #1890ff;
}

.history-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.history-meta {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: #8c8c8c;
}

.history-delete {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    transition: opacity 0.2s;
    background: none;
    border: none;
    color: #ff4d4f;
    font-size: 12px;
    cursor: pointer;
}

.history-item:hover .history-delete {
    opacity: 1;
}

.empty-history, .loading-text {
    text-align: center;
    color: #8c8c8c;
    font-size: 12px;
    padding: 40px 20px;
}

.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.chat-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

.welcome-message {
    text-align: center;
    color: #8c8c8c;
    padding: 60px 20px;
}

.welcome-icon {
    font-size: 56px;
    margin-bottom: 20px;
}

.welcome-hint {
    font-size: 12px;
    margin-top: 10px;
    opacity: 0.7;
}

.chat-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #f0f0f0;
}

.footer-left, .footer-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.chat-message code {
    background: #f6f6f6;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-family: monospace;
}

.chat-message pre {
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
}

.chat-message pre code {
    background: none;
    padding: 0;
    color: inherit;
}

@media (max-width: 768px) {
    .chat-container-full {
        flex-direction: column;
    }
    
    .history-sidebar {
        width: 100%;
        max-height: 200px;
    }
}
</style>
{% endblock %}
