{% extends "base.html" %}

{% block title %}编辑用户 - AI 中转平台{% endblock %}

{% block content %}
<div class="card" style="max-width:500px">
    <h3>编辑用户 - {{ edit_user.username }}</h3>
    <form method="post">
        <div class="form-row">
            <label style="width:80px">余额：</label>
            <input name="balance" value="{{ edit_user.balance }}" step="0.01" type="number" style="flex:1">
        </div>
        <div class="form-row">
            <label style="width:80px">状态：</label>
            <select name="status" style="flex:1">
                <option value="1" {% if edit_user.status == 1 %}selected{% endif %}>正常</option>
                <option value="0" {% if edit_user.status == 0 %}selected{% endif %}>禁用</option>
            </select>
        </div>
        <button class="btn btn-primary" type="submit">保存</button>
        <a href="/admin/users" class="btn btn-default">返回</a>
    </form>
</div>
{% endblock %}
